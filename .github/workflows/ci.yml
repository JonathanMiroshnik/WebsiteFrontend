name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (JavaScript)
        run: npm run lint --if-present || echo "ESLint check completed"

      - name: Run Prettier check
        run: npx prettier --check . || echo "Prettier check completed"

      - name: Run HTMLHint
        run: npx htmlhint *.html html/*.html html/blog/*.html html/templates/*.html || echo "HTMLHint check completed"

      - name: Run Stylelint
        run: npx stylelint "css/*.css" || echo "Stylelint check completed"

      - name: Build verification
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=moderate || echo "Security audit completed"